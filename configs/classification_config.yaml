# Classification model — Complete_Autoencoder
# Attention encoder + FFNN decoder with softmax output (2 classes)

model:
  encoder:
    d_embed: 128
    d_ff: 64
    num_heads: 8
    dropout: 0.1
  decoder:
    latent_dim: 128
    hidden_layers: [128, 64, 64, 32, 16]
    output_dim: 2          # 2 classes: Normal / Fraud
    activation: "relu"
    dropout: 0.1
    batch_norm: true
  task: "classification"

test_size: 0.2
drop_time: false    # true → drop the 'Time' column before preprocessing
use_smote: true     # false → usa dataset originale sbilanciato + Weighted CrossEntropy

training:
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adam"
  batch_size: 512
  scheduler:
    type: "reduce_on_plateau"  # era "none" — ora riduce il LR quando la val_loss smette di migliorare
    patience:   7                # epoche senza miglioramento prima di ridurre il LR
    factor: 0.5                # LR dimezzato ogni volta
  early_stopping:
    enabled: true
    patience: 20         # era 10 — troppo aggressivo, fermava a ep.19 con underfitting
    min_delta: 0.0001    # era 0.00001 — troppo piccolo, qualsiasi rumore bloccava il contatore
  loss: "ce"             # Loss function: ce (CrossEntropy for classification)
  val_metric: "f1"       # Metrica per checkpointing/early-stopping: "f1" | "loss"

classification:
  threshold_method: "f1_optimal"   # percentile | mean_std | f1_optimal
  percentile: 95
  std_multiplier: 2.0
  plots_dir: "plots/classification"
  results_dir: "results/classification"

paths:
  data_dir: "data/"
  checkpoint_dir: "checkpoints/"
  checkpoint_name: "Classifier_best.pt"   # nome del checkpoint salvato/caricato
  log_dir: "logs/"

seed: 42
device: "cpu"
