# ============================================================================
#  FFNN Autoencoder — Configuration
#  Credit Card Fraud Detection (Anomaly Detection)
# ============================================================================
# This file controls the entire architecture and training pipeline.
# To change the model depth/width, edit encoder_layers / decoder_layers.
# No code changes are required.
# ============================================================================

# ─── Model Architecture ─────────────────────────────────────────────────────
model:
  encoder:
    d_embed: 32            
    d_ff: 16
    num_heads: 2
    dropout: 0.1
  decoder:
    latent_dim: 32
    hidden_layers: [16, 8, 4]
    output_dim: 1
    activation: "relu"
    dropout: 0.1
    batch_norm: True
  task: "classification"           # "classification" or "reconstruction"

# ─── DataLoaders ───────────────────────────────────────────────────────────────
batch_size: 256                    # Mini-batch size
test_size: 0.2                     # fraction of samples for the test set
val_size: 0                        # fraction of samples for the validation set


# ─── Training ───────────────────────────────────────────────────────────────
training:
  epochs: 100                        # Maximum number of training epochs
  learning_rate: 0.001               # Initial learning rate
  weight_decay: 0.0001               # L2 regularization (AdamW)
  optimizer: "adam"                   # Optimizer: adam | adamw | sgd
  scheduler:
    type: "reduce_on_plateau"        # LR scheduler: reduce_on_plateau | cosine | step | none
    patience: 10                     # Epochs to wait before reducing LR (reduce_on_plateau)
    factor: 0.5                      # LR reduction factor
    step_size: 30                    # Step size for StepLR scheduler
  early_stopping:
    enabled: true                    # Enable early stopping
    patience: 10                     # Epochs without improvement before stopping
    min_delta: 0.0001                # Minimum improvement to count as progress
  loss: "bce"                        # Reconstruction loss: mse | mae | huber | bce

# ─── Anomaly Detection ──────────────────────────────────────────────────────
anomaly:
  threshold_method: "f1_optimal"     # Method: percentile | mean_std | f1_optimal
  percentile: 95                     # Percentile of val errors (if method = percentile)
  std_multiplier: 2.0                # N standard deviations above mean (if method = mean_std)

# ─── Paths ───────────────────────────────────────────────────────────────────
paths:
  data_dir: "data/"
  checkpoint_dir: "checkpoints/"
  log_dir: "logs/"

# ─── Reproducibility ────────────────────────────────────────────────────────
seed: 42
device: "cpu"                        # cpu (GPU not used — local training)
