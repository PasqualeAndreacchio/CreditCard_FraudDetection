model:
  task: reconstruction
lstm_model:
  input_dim: 30
  hidden_dim: 64
  latent_dim: 8
  num_layers: 1
  dropout: 0.25
sequence:
  seq_len: 3
  stride: 1
  only_normal: true
  drop_time: true
batch_size: 512
num_workers: 8
test_size: 0.2
val_size: 0.15
training:
  epochs: 100
  learning_rate: 0.0007437630164903287
  weight_decay: 0.00029690750670353103
  optimizer: adamw
  scheduler:
    type: reduce_on_plateau
    patience: 5
    factor: 0.5
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 1.0e-05
  loss: mse
anomaly:
  threshold_method: f1_optimal
  percentile: 95
  std_multiplier: 2.0
  plots_dir: plots/lstm
  results_dir: results/lstm
paths:
  data_dir: data/
  checkpoint_dir: checkpoints/lstm
  checkpoint_name: lstm_autoencoder_best.pt
  log_dir: logs/lstm
seed: 42
device: cpu
